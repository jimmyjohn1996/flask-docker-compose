<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saffron & Sage — Reservations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #1a1a1a; color: #fff; }
        header { background: #2c1810; padding: 20px; text-align: center; border-bottom: 2px solid #c9a96e; }
        header h1 { color: #c9a96e; font-size: 2.5em; letter-spacing: 3px; }
        header p { color: #999; margin-top: 5px; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .form-section { background: #2c2c2c; padding: 40px; border-radius: 10px; margin-bottom: 40px; border: 1px solid #444; }
        .form-section h2 { color: #c9a96e; margin-bottom: 25px; font-size: 1.5em; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #c9a96e; margin-bottom: 8px; font-size: 0.9em; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 1em; }
        input:focus { outline: none; border-color: #c9a96e; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { background: #c9a96e; color: #1a1a1a; border: none; padding: 15px 40px; font-size: 1em; cursor: pointer; border-radius: 5px; width: 100%; font-weight: bold; letter-spacing: 2px; margin-top: 10px; }
        button:hover { background: #b8935a; }
        .message { padding: 15px; border-radius: 5px; margin-top: 20px; text-align: center; display: none; }
        .success { background: #1a3a1a; border: 1px solid #4CAF50; color: #4CAF50; }
        .error { background: #3a1a1a; border: 1px solid #f44336; color: #f44336; }
        .reservations-section { background: #2c2c2c; padding: 40px; border-radius: 10px; border: 1px solid #444; }
        .reservations-section h2 { color: #c9a96e; margin-bottom: 25px; font-size: 1.5em; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #c9a96e; color: #1a1a1a; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #444; color: #ccc; }
        tr:hover td { background: #333; }
        .no-reservations { text-align: center; color: #666; padding: 30px; }
        .refresh-btn { background: transparent; color: #c9a96e; border: 1px solid #c9a96e; padding: 8px 20px; cursor: pointer; border-radius: 5px; margin-bottom: 20px; width: auto; letter-spacing: 1px; }
        .refresh-btn:hover { background: #c9a96e; color: #1a1a1a; }
    </style>
</head>
<body>
    <header>
        <h1>SAFFRON & SAGE</h1>
        <p>Modern Indian Fine Dining — Reserve Your Table</p>
    </header>

    <div class="container">
        <div class="form-section">
            <h2>MAKE A RESERVATION</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text" id="name" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="email" placeholder="your@email.com">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>DATE</label>
                    <input type="date" id="date">
                </div>
                <div class="form-group">
                    <label>NUMBER OF GUESTS</label>
                    <input type="number" id="guests" min="1" max="20" placeholder="2">
                </div>
            </div>
            <button onclick="makeReservation()">CONFIRM RESERVATION</button>
            <div class="message" id="message"></div>
        </div>

        <div class="reservations-section">
            <h2>ALL RESERVATIONS</h2>
            <button class="refresh-btn" onclick="loadReservations()">↻ REFRESH</button>
            <div id="reservations-list"></div>
        </div>
    </div>

    <script>
        async function makeReservation() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const date = document.getElementById('date').value;
            const guests = document.getElementById('guests').value;

            if (!name || !email || !date || !guests) {
                showMessage('Please fill in all fields!', 'error');
                return;
            }

            try {
                const response = await fetch('/reserve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, date, guests: parseInt(guests) })
                });
                const data = await response.json();
                showMessage('Shukriya! ' + data.message, 'success');
                loadReservations();
                clearForm();
            } catch (error) {
                showMessage('Something went wrong. Please try again.', 'error');
            }
        }

        async function loadReservations() {
            try {
                const response = await fetch('/reservations');
                const reservations = await response.json();
                const list = document.getElementById('reservations-list');

                if (reservations.length === 0) {
                    list.innerHTML = '<p class="no-reservations">No reservations yet.</p>';
                    return;
                }

                list.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Date</th>
                                <th>Guests</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${reservations.map(r => `
                                <tr>
                                    <td>${r.id}</td>
                                    <td>${r.name}</td>
                                    <td>${r.email}</td>
                                    <td>${r.date}</td>
                                    <td>${r.guests}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            } catch (error) {
                document.getElementById('reservations-list').innerHTML =
                    '<p class="no-reservations">Could not load reservations.</p>';
            }
        }

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message ' + type;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function clearForm() {
            ['name', 'email', 'date', 'guests'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }

        // Load reservations on page load
        loadReservations();
    </script>
</body>
</html>
